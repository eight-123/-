<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元素周期表アプリ</title>

<style>
 
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:15px;
}

/* 上部表示 */

#topPanel{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

#elementTitle{
    text-align:center;
    font-size:28px;
    margin-bottom:15px;
}

/* ボタン */

#modeButtons{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.active{
    background:#4a90e2;
    color:white;
}

.inactive{
    background:#ddd;
}

/* 原子モデル */

#atomViewer{
    width:320px;
    height:320px;
    margin:auto;
    position:relative;
    background:#fafafa;
    border-radius:20px;
}

.nucleus{
    position:absolute;
    width:28px;
    height:28px;
    background:#ff4d4d;
    border-radius:50%;
    left:146px;
    top:146px;
}

.orbit{
    position:absolute;
    border:2px solid #bbb;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.electron{
    position:absolute;
    width:10px;
    height:10px;
    background:#2196f3;
    border-radius:50%;
}

/* 説明欄 */

#info{
    margin-top:20px;
    text-align:center;
    font-size:18px;
    line-height:1.8;
}

/* 周期表 */

#tableWrapper{
    overflow-x:auto;
    padding-bottom:10px;
}

#periodicTable{
    display:grid;
    grid-template-columns:repeat(18,55px);
    grid-template-rows:repeat(10,55px);
    gap:4px;
    min-width:1060px;
}

/* 元素 */

.element{
    background:white;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-weight:bold;
    transition:.15s;
    user-select:none;
}

.element:hover{
    transform:scale(1.05);
}

/* 色分類 */

.alkali{
    background:#ffb3b3;
}

.alkaline{
    background:#ffd699;
}

.transition{
    background:#fff2a8;
}

.nonmetal{
    background:#b8f5b8;
}

.halogen{
    background:#bde8ff;
}

.noble{
    background:#d6c5ff;
}

.other{
    background:#dddddd;
}

/* スマホ */

@media(max-width:700px){

    #atomViewer{
        width:250px;
        height:250px;
    }

    .nucleus{
        left:111px;
        top:111px;
    }

    button{
        padding:10px 15px;
        font-size:14px;
    }

    #elementTitle{
        font-size:22px;
    }
}

</style>
</head>

<body>

    <div id="elementTitle">
        元素を選択
    </div>

    <div id="modeButtons">
        <button id="normalBtn" class="active">通常</button>
        <button id="ionBtn" class="inactive">イオン</button>
    </div>

    <div id="atomViewer"></div>

    <div id="info">
        下の周期表から選択
    </div>

</div>

<div id="tableWrapper">
    <div id="periodicTable"></div>

    ionBtn.className="inactive";

    if(currentElement){
        showElement(currentElement);

};

/* 周期表描画 */

function buildTable(){

    table.innerHTML = "";

    elements.forEach(el=>{

        const div =
        document.createElement("div");

        div.className =
        "element " + el.category;

        div.textContent =
        el.symbol;

        div.style.gridRow =
        el.row;

        div.style.gridColumn =
        el.col;

        div.onclick = ()=>{

            currentElement = el;
            showElement(el);

        };

        table.appendChild(div);
    });
}


function showElement(el){

    title.textContent =
    el.name + " (" + el.symbol + ")";

    let electronCount =
    el.number;

    let explanation = "";

    /* イオンモード */

    if(mode==="ion"){

        const ion =
        getIonInfo(el);

        if(ion.canIon){

            /* ここ修正版 */

            if(ion.charge > 0){

                // 陽イオン（電子を失う）
                electronCount =
                el.number - ion.charge;

            }

            else{

                // 陰イオン（電子を受け取る）
                electronCount =
                el.number +
                Math.abs(ion.charge);

            }

            title.textContent =
            el.name +
            " (" +
            el.symbol +
            ion.text +
            ")";

            explanation =
            ion.explanation;

        }

        else{

            explanation =
            ion.explanation;
        }

    }

    /* 通常モード */

    else{

        explanation =
        "通常の原子";

    }

    /* 電子配置取得 */

    const shells =
    getElectronShells(
        electronCount
    );

    /* 原子モデル描画 */

    drawAtom(shells);

    /* 殻表示 */

    const shellNames =
    ["K","L","M","N","O","P","Q"];

    let shellText = "";

    for(let i=0;i<shells.length;i++){

        shellText +=
        shellNames[i] +
        "殻 " +
        shells[i] +
        "個<br>";

    }

    /* 情報表示 */

    info.innerHTML =
    "原子番号 " +
    el.number +
    "<br><br>" +
    shellText +
    "<br>" +
    explanation;

}
function getIonInfo(el){

    /* 個別例外 */

    const fixed = {

        H:1,
        Ag:1,
        Zn:2,
        Cu:2,
        Fe:2

    };

    /* 希ガス */

    if(el.category==="noble"){

        return{

            canIon:false,

            explanation:
            "すでに安定しています<br>イオンになりにくい"

        };
    }

    /* 個別 */

    if(fixed[el.symbol]){

        const charge =
        fixed[el.symbol];

        return{

            canIon:true,

            charge:charge,

            text:charge+"+",

            explanation:
            "中学で扱う代表的なイオン<br>" +
            charge +
            "個電子を放出"

        };
    }

    /* 1族 */

    if(el.col===1){

        return{

            canIon:true,

            charge:1,

            text:"+",

            explanation:
            "最外殻電子1個<br>1個放出 → 安定"

        };
    }

    /* 2族 */

    if(el.col===2){

        return{

            canIon:true,

            charge:2,

            text:"2+",

            explanation:
            "最外殻電子2個<br>2個放出 → 安定"

        };
    }

    /* 13族 */

    if(el.col===13){

        return{

            canIon:true,

            charge:3,

            text:"3+",

            explanation:
            "3個放出 → 安定"

        };
    }

    /* 15族 */

    if(el.col===15){

        return{

            canIon:true,

            charge:-3,

            text:"3-",

            explanation:
            "電子3個受け取る"

        };
    }

    /* 16族 */

    if(el.col===16){

        return{

            canIon:true,

            charge:-2,

            text:"2-",

            explanation:
            "電子2個受け取る"

        };
    }

    /* 17族 */

    if(el.col===17){

        return{

            canIon:true,

            charge:-1,

            text:"-",

            explanation:
            "電子1個受け取る"

        };
    }

    /* その他 */

    return{

        canIon:false,

        explanation:
        "中学範囲では<br>代表的なイオンを扱いません"

    };

}

function getElectronShells(number){

    // 中学理科用（殻モデル）

    const capacities =
    [2,8,18,32,32,18,8];

    let result = [];

    let remaining = number;

    for(let i=0;i<capacities.length;i++){

        if(remaining<=0) break;

        const put =
        Math.min(
            capacities[i],
            remaining
        );

        result.push(put);

        remaining -= put;
    }

    return result;
}

function drawAtom(shells){

    viewer.innerHTML = "";

    const center =
    viewer.clientWidth / 2;

    // 原子核

    const nucleus =
    document.createElement("div");

    nucleus.className =
    "nucleus";

    viewer.appendChild(nucleus);

    // 半径

    const baseRadius =
    viewer.clientWidth * 0.15;

    // 殻

    shells.forEach((count,index)=>{

        const radius =
        baseRadius +
        index*28;

        // 軌道

        const orbit =
        document.createElement("div");

        orbit.className =
        "orbit";

        orbit.style.width =
        radius*2 + "px";

        orbit.style.height =
        radius*2 + "px";

        viewer.appendChild(orbit);

        // 電子

        for(let i=0;i<count;i++){

            const angle =
            (Math.PI*2*i)/count;

            const x =
            center +
            radius*Math.cos(angle);

            const y =
            center +
            radius*Math.sin(angle);

            const electron =
            document.createElement("div");

            electron.className =
            "electron";

            electron.style.left =
            (x-5)+"px";

            electron.style.top =
            (y-5)+"px";

            viewer.appendChild(electron);

        }

    });

}

/* 起動 */

buildTable();
showElement(elements[0]);
currentElement = elements[0];

</script>

</html>
