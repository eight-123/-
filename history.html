<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>日本史 時系列クイズ</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f3f3f3;
    padding: 20px;
    margin: 0;
}

h2{
    margin-bottom: 20px;
}

button{
    margin: 6px;
    padding: 10px 18px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #ddd;
    cursor: pointer;
}

#quiz{
    max-height: 65vh;
    overflow: auto;
    margin-top: 20px;
}

.event{
    background: white;
    margin: 8px auto;
    width: 330px;
    max-width: 90%;
    padding: 14px;
    border: 2px solid gray;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.selected{
    background: #bfe3ff;
    transform: scale(1.03);
    border: 2px solid #2b7cff;
}

.correct{
    background: #d8ffd8;
    border: 2px solid #33aa33;
}

.wrong{
    background: #ffd6d6;
    border: 2px solid #dd3333;
}

#result{
    margin-top: 25px;
    padding-bottom: 30px;
    font-size: 18px;
}

.answer{
    margin-top: 15px;
    font-size: 15px;
    line-height: 1.7;
}

</style>
</head>
<body>

<h2>日本史 時系列クイズ</h2>

<button onclick="generateRandom()">通常(5問)</button>
<button onclick="generateAll()">全部モード</button>
<button onclick="checkAnswer()">答え合わせ</button>

<div id="quiz"></div>
<div id="result"></div>

<script>

const events = [
{name:"青鞜社",year:1911},
{name:"護憲運動",year:1912},
{name:"大戦景気",year:1914},
{name:"米騒動",year:1918},
{name:"政党内閣の成立",year:1918.1},
{name:"全国水平社",year:1922},
{name:"関東大震災",year:1923},
{name:"治安維持法",year:1925},
{name:"男子普通選挙",year:1925.1},
{name:"金融恐慌",year:1927},
{name:"世界恐慌",year:1929},
{name:"昭和恐慌",year:1930},
{name:"満州事変",year:1931},
{name:"五一五事件",year:1932},
{name:"国際連盟脱退",year:1933},
{name:"二二六事件",year:1936},
{name:"盧溝橋事件",year:1937},
{name:"日中戦争",year:1937.1},
{name:"国家総動員法",year:1938},
{name:"独ソ不可侵条約",year:1939},
{name:"第二次世界大戦",year:1939.1},
{name:"大政翼賛会",year:1940},
{name:"日独伊三国同盟",year:1940.1},
{name:"日ソ中立条約",year:1941},
{name:"大西洋憲章",year:1941.1},
{name:"真珠湾奇襲",year:1941.2},
{name:"太平洋戦争",year:1941.3},
{name:"ミッドウェー海戦",year:1942},
{name:"サイパン島占領",year:1944},
{name:"ヤルタ会談",year:1945},
{name:"東京大空襲",year:1945.1},
{name:"沖縄戦",year:1945.2},
{name:"ポツダム宣言",year:1945.3},
{name:"原爆広島",year:1945.4},
{name:"原爆長崎",year:1945.5},
{name:"玉音放送",year:1945.6},
{name:"国際連合",year:1945.7},
{name:"日本国憲法公布",year:1946},
{name:"日本国憲法施行",year:1947},
{name:"自衛隊",year:1954}
];

let current = [];
let selected = null;

function shuffle(arr){
    return arr.sort(() => Math.random() - 0.5);
}

function resetSelection(){

    if(selected){
        selected.classList.remove("selected");
    }

    selected = null;
}

function clearColors(){

    document.querySelectorAll(".event").forEach(el => {
        el.classList.remove("correct");
        el.classList.remove("wrong");
    });
}

function render(list){

    resetSelection();
    clearColors();

    document.getElementById("result").innerHTML = "";

    current = list;

    let display = shuffle([...list]);

    let quiz = document.getElementById("quiz");
    quiz.innerHTML = "";

    display.forEach(e => {

        let div = document.createElement("div");

        div.className = "event";
        div.innerText = e.name;
        div.dataset.year = e.year;

        div.onclick = function(){
            choose(this);
        };

        quiz.appendChild(div);
    });
}

function generateRandom(){
    let list = shuffle([...events]).slice(0,5);
    render(list);
}

function generateAll(){
    render([...events]);
}

function choose(item){

    clearColors();

    if(selected === null){

        selected = item;
        item.classList.add("selected");
        return;
    }

    if(selected === item){

        item.classList.remove("selected");
        selected = null;
        return;
    }

    // 入れ替え
    let tempText = selected.innerText;
    let tempYear = selected.dataset.year;

    selected.innerText = item.innerText;
    selected.dataset.year = item.dataset.year;

    item.innerText = tempText;
    item.dataset.year = tempYear;

    selected.classList.remove("selected");
    selected = null;
}

function checkAnswer(){

    resetSelection();
    clearColors();

    let items = [...document.querySelectorAll(".event")];

    let userOrder = items.map(i => parseFloat(i.dataset.year));

    let correctEvents = [...current].sort((a,b)=>a.year-b.year);

    let correct = true;

    for(let i=0;i<items.length;i++){

        if(userOrder[i] === correctEvents[i].year){

            items[i].classList.add("correct");

        }else{

            items[i].classList.add("wrong");
            correct = false;
        }
    }

    let result = document.getElementById("result");

    if(correct){

        result.innerHTML = "✅ 完全正解！";

    }else{

        let answer = correctEvents
            .map(e => e.name)
            .join(" → ");

        result.innerHTML = `
        ❌ 不正解
        <div class="answer">
        正しい順番:<br><br>
        ${answer}
        </div>
        `;
    }
}

generateRandom();

</script>

</body>
</html>
