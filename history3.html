<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第二次世界大戦 年表</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
    text-align:center;
}

h1{
    margin:20px;
}

/* 横スクロール */

#container{
    overflow-x:auto;
    border-top:2px solid gray;
    border-bottom:2px solid gray;
    background:white;
}

/* メインキャンバス */

#timeline{
    width:2500px;
    height:650px;
    position:relative;
    margin:20px;
}

/* 横線 */

.lane{
    position:absolute;
    width:2400px;
    border-top:1px solid #ccc;
}

/* 国名 */

.label{
    position:absolute;
    left:0;
    font-weight:bold;
    background:#f5f5f5;
    padding-right:10px;
}

/* 年 */

.yearMark{
    position:absolute;
    top:0;
    font-size:14px;
    color:gray;
}

/* イベント */

.event{
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
    background:#4488ff;
    cursor:pointer;
    transition:0.2s;
}

.event:hover{
    transform:scale(1.3);
}

/* 保存済み */

.saved{
    background:#44bb44;
    transform:scale(1.25);
}

/* 編集 */

#editor{
    margin:20px auto;
    width:80%;
    max-width:700px;
    background:white;
    padding:20px;
    border-radius:15px;
}

textarea{
    width:95%;
    height:200px;
    font-size:18px;
    padding:10px;
}
</style>
</head>

<body>

<h1>第二次世界大戦 年表</h1>

<div id="container">
    <div id="timeline"></div>
</div>

<div id="editor">
    <h2 id="title">イベントを選択</h2>
    <textarea id="memo" placeholder="メモを書く"></textarea>
</div>

<script>

const lanes = {
    "日本":80,
    "ドイツ":150,
    "イタリア":220,
    "アメリカ":290,
    "ソ連":360,
    "中国":430,
    "国際":500
};

const allEvents = [

{name:"大政翼賛会", year:1940, team:"日本"},
{name:"日ソ中立条約", year:1941, team:"日本"},
{name:"ABCD包囲網", year:1941, team:"日本"},
{name:"真珠湾奇襲", year:1941, team:"日本"},
{name:"太平洋戦争", year:1941, team:"日本"},
{name:"大東亜共栄圏", year:1942, team:"日本"},
{name:"ミッドウェー海戦", year:1942, team:"日本"},
{name:"ガダルカナル島の戦い", year:1942, team:"日本"},
{name:"サイパン島占領", year:1944, team:"日本"},
{name:"東京大空襲", year:1945, team:"日本"},
{name:"ポツダム宣言受諾", year:1945, team:"日本"},
{name:"終戦の玉音放送", year:1945, team:"日本"},

{name:"独ソ不可侵条約", year:1939, team:"ドイツ"},
{name:"日独伊三国同盟", year:1940, team:"ドイツ"},
{name:"ドイツ降伏", year:1945, team:"ドイツ"},

{name:"日独伊三国同盟", year:1940, team:"イタリア"},
{name:"イタリア降伏", year:1943, team:"イタリア"},

{name:"ABCD包囲網", year:1941, team:"アメリカ"},
{name:"大西洋憲章", year:1941, team:"アメリカ"},
{name:"ミッドウェー海戦", year:1942, team:"アメリカ"},
{name:"ガダルカナル島の戦い", year:1942, team:"アメリカ"},
{name:"サイパン島占領", year:1944, team:"アメリカ"},
{name:"広島原爆投下", year:1945, team:"アメリカ"},
{name:"長崎原爆投下", year:1945, team:"アメリカ"},

{name:"独ソ不可侵条約", year:1939, team:"ソ連"},
{name:"日ソ中立条約", year:1941, team:"ソ連"},
{name:"ヤルタ会談", year:1945, team:"ソ連"},
{name:"ソ連対日参戦", year:1945, team:"ソ連"},

{name:"盧溝橋事件", year:1937, team:"中国"},
{name:"日中戦争", year:1937, team:"中国"},
{name:"皇民化政策", year:1942, team:"中国"},

{name:"大西洋憲章", year:1941, team:"国際"},
{name:"ヤルタ会談", year:1945, team:"国際"},
{name:"ポツダム宣言", year:1945, team:"国際"},
{name:"国際連合成立", year:1945, team:"国際"}

];

const timeline = document.getElementById("timeline");
const memo = document.getElementById("memo");
const title = document.getElementById("title");

let current = null;

function yearToX(year){
    return (year - 1937) * 250 + 150;
}

/* レーン生成 */

for(let team in lanes){

    let line = document.createElement("div");
    line.className="lane";
    line.style.top=lanes[team]+"px";
    line.style.left="120px";
    timeline.appendChild(line);

    let label=document.createElement("div");
    label.className="label";
    label.textContent=team;
    label.style.top=(lanes[team]-10)+"px";
    timeline.appendChild(label);
}

/* 年表示 */

for(let y=1937;y<=1945;y++){

    let year=document.createElement("div");
    year.className="yearMark";
    year.textContent=y;
    year.style.left=yearToX(y)+"px";
    year.style.top="20px";

    timeline.appendChild(year);
}

/* イベント生成 */

function drawEvents(){

    allEvents.forEach(event=>{

        let dot=document.createElement("div");
        dot.className="event";

        let saved=localStorage.getItem(
            "memo_"+event.name+"_"+event.team
        );

        if(saved && saved!==""){
            dot.classList.add("saved");
        }

        dot.style.left=yearToX(event.year)+"px";
        dot.style.top=(lanes[event.team]-11)+"px";

        dot.onclick=()=>openMemo(event);

        timeline.appendChild(dot);
    });
}

function openMemo(event){

    current=event;

    title.textContent=
      event.name+" ("+event.team+")";

    memo.value=
      localStorage.getItem(
        "memo_"+event.name+"_"+event.team
      ) || "";
}

memo.addEventListener("input",()=>{

    if(!current) return;

    localStorage.setItem(
      "memo_"+current.name+"_"+current.team,
      memo.value
    );

    location.reload();
});

drawEvents();

</script>

</body>
</html>
