/* ===== 全体 ===== */

body{
    margin:0;

    background:#f5f5f5;
}

/* ===== 横並び ===== */

#app{
    display:flex;
    height:100vh;
}

/* ===== 左 ===== */

#leftPanel{

    width:75%;

    border-right:2px solid #ccc;

    overflow-x:auto;
    overflow-y:auto;

    background:white;

    position:relative;
}

/* タイムライン */

#timeline{

    position:relative;

    width:9000px;

    height:900px;

    padding-top:40px;
}

/* 線描画 */

#lines{

    position:absolute;

    top:0;
    left:0;

    pointer-events:none;

    z-index:1;
}

/* ===== 右 ===== */

#rightPanel{

    width:25%;

    padding:20px;

    background:#fafafa;

    box-sizing:border-box;

    overflow-y:auto;
}

/* ===== タイトル ===== */

h1{

    margin-top:0;
}

/* ===== 国レーン ===== */

.lane{

    position:absolute;

    width:8500px;

    border-top:1px solid #ddd;
}

.laneLabel{

    position:absolute;

    left:15px;

    font-weight:bold;

    font-size:18px;
}

/* ===== 年 ===== */

.yearLabel{

    position:absolute;

    top:5px;

    color:gray;

    font-size:14px;
}

/* ===== 月 ===== */

.monthLabel{

    position:absolute;

    top:22px;

    color:#999;

    font-size:10px;
}

/* ===== カード ===== */

.event{

    position:absolute;

    width:62px;

    min-height:28px;

    padding:4px;

    box-sizing:border-box;

    border-radius:8px;

    text-align:center;

    font-size:11px;

    line-height:1.1;

    cursor:pointer;

    transition:0.15s;

    z-index:5;

    user-select:none;
}

.event:hover{

    transform:scale(1.08);

}

/* 選択 */

.selected{

    border:3px solid #4488ff;

}

/* ===== 詳細 ===== */

#eventTitle{

    font-size:24px;

    margin-bottom:10px;
}

.section{

    margin-top:20px;

    font-weight:bold;
}

#memo{

    width:100%;

    height:220px;

    margin-top:10px;

    font-size:16px;

    padding:10px;

    box-sizing:border-box;
}

/* ===== 色 ===== */

/* ===== 日付→X座標 ===== */

function dateToX(year,month,day){

    const start =
      new Date(1931,0,1);

    const current =
      new Date(
        year,
        month-1,
        day || 1
      );

    const diffDays =
      (current-start)
      /
      (1000*60*60*24);

    return diffDays * 0.65 + 160;
}


/* ===== レーン描画 ===== */

for(let team in lanes){

    let line =
      document.createElement("div");

    line.className = "lane";

    line.style.top =

    line.style.left = "110px";

    timeline.appendChild(line);


    let label =
      document.createElement("div");

    label.className =
      "laneLabel";

    label.textContent =
      team;

    label.style.top =
      (lanes[team]-10)
      + "px";

    timeline.appendChild(label);
}


/* ===== 年表示 ===== */

for(let y=1931; y<=1954; y++){

    let year =
      document.createElement("div");

    year.className =
      "yearLabel";

    year.textContent = y;

    year.style.left =
      dateToX(y,1,1)
      + "px";

    timeline.appendChild(year);
}


/* ===== カード生成 ===== */

function drawEvents(){

   events.forEach(event=>{

      let card =
        document.createElement("div");

      card.className =
        "event "
        + teamClass[event.team];

      card.textContent =
        event.short;


      let x =
        dateToX(
          event.year,
          event.month,
          event.day
        );

      let y =
        lanes[event.team]-16;


      card.style.left =
        x + "px";

      card.style.top =
        y + "px";


      timeline.appendChild(card);

      eventElements[event.id] =
        card;

   });

}

drawEvents();

/* ===== Canvas設定 ===== */

canvas.width = 9000;
canvas.height = 1000;


/* ===== idからイベント取得 ===== */

function getEventById(id){

   return events.find(
      e => e.id === id
   );

}


/* ===== L字線 ===== */

function drawConnector(from,to){

   let fromEl =
      eventElements[from.id];

   let toEl =
      eventElements[to.id];

   if(!fromEl || !toEl) return;


   /* 始点 */

   let x1 =
      fromEl.offsetLeft
      + 62;

   let y1 =
      fromEl.offsetTop
      + 14;


   /* 終点 */

   let x2 =
      toEl.offsetLeft;

   let y2 =
      toEl.offsetTop
      + 14;


   /* 中継点 */

   let midX =
      (x1+x2)/2;


   ctx.beginPath();

   ctx.lineWidth = 2;

   ctx.strokeStyle =
      "#666";


   /* ──┐ */

   ctx.moveTo(x1,y1);

   ctx.lineTo(midX,y1);

   /* │ */

   ctx.lineTo(midX,y2);

   /* └→ */

   ctx.lineTo(x2,y2);

   ctx.stroke();

}


/* ===== 全線描画 ===== */

function drawAllLines(){

   events.forEach(event=>{

      if(
        !event.links ||
        event.links.length===0
      ) return;


      event.links.forEach(linkId=>{

         let target =
            getEventById(linkId);

         if(target){

            drawConnector(
              event,
              target
            );

         }

      });

   });

}


/* ===== 描画 ===== */

drawAllLines();

/* ===== 右パネル ===== */

const eventTitle =

 );

const eventDate =

const eventCause =

const eventResult =

 );

const memo =

 );


/* ===== カードクリック ===== */

function selectEvent(event){

    currentEvent = event;


    /* 青枠解除 */

    if(selectedCard){

       selectedCard.classList
         .remove("selected");

    }


    /* 新青枠 */

    let card =
      eventElements[event.id];

    card.classList
      .add("selected");

    selectedCard = card;


    /* 詳細 */

    eventTitle.textContent =
      event.name;

    eventDate.textContent =
      event.year
      + "/"
      + event.month
      + "/"
      + (event.day || 1);

    eventDescription.textContent =
      event.description;

    eventCause.textContent =
      event.cause;

    eventResult.textContent =
      event.result;


    /* メモ読み込み */

    let key =
      "memo_"
      + event.id;

    memo.value =
      localStorage.getItem(key)
      || "";

}


/* ===== クリック登録 ===== */

events.forEach(event=>{

    let card =
      eventElements[event.id];

    card.addEventListener(
      "click",
      ()=>{

        selectEvent(
          event
        );

      }
    );

});


/* ===== メモ保存 ===== */

memo.addEventListener(
  "input",
  ()=>{

    if(!currentEvent)
      return;

    let key =
      "memo_"
      + currentEvent.id;

    localStorage.setItem(
      key,
      memo.value
    );

  }
);


/* ===== 初期選択 ===== */

selectEvent(
  events[0]
);
